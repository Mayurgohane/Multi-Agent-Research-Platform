services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: marp
      POSTGRES_PASSWORD: marp
      POSTGRES_DB: marp
    ports:
      - "5432:5432"
    volumes:
      - marp_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marp -d marp"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build: .
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql+asyncpg://marp:marp@postgres:5432/marp
      REDIS_URL: redis://redis:6379/0
      APP_ENV: development
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-placeholder}
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://marp:marp@postgres:5432/marp
      REDIS_URL: redis://redis:6379/0
      APP_ENV: development
      DEBUG: "true"
      API_KEY: ${API_KEY:-change-me-in-production}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-placeholder}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      SEMANTIC_SCHOLAR_API_KEY: ${SEMANTIC_SCHOLAR_API_KEY:-}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build: .
    command: arq app.workers.research_worker.WorkerSettings
    environment:
      DATABASE_URL: postgresql+asyncpg://marp:marp@postgres:5432/marp
      REDIS_URL: redis://redis:6379/0
      APP_ENV: development
      API_KEY: ${API_KEY:-change-me-in-production}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-placeholder}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      SEMANTIC_SCHOLAR_API_KEY: ${SEMANTIC_SCHOLAR_API_KEY:-}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      api:
        condition: service_started

  web:
    build:
      context: ../frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
        NEXT_PUBLIC_API_KEY: ${API_KEY:-change-me-in-production}
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      API_INTERNAL_BASE_URL: http://api:8000
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      NEXT_PUBLIC_API_KEY: ${API_KEY:-change-me-in-production}
    depends_on:
      api:
        condition: service_healthy

volumes:
  marp_pg:
